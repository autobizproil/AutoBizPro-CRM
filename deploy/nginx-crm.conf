# /etc/nginx/sites-available/crm — copy there, then:
#   sudo ln -s /etc/nginx/sites-available/crm /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Same-origin layout matching local dev (Vite's /api + /sanctum proxy):
# frontend static files at /, Laravel backend at /api and /sanctum via php-fpm.
# Edit server_name and the two root paths for your actual domain/paths.

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;   # EDIT ME (or the VPS IP if no domain yet)

    # --- Frontend: built static files (npm run build output) ---
    root /var/www/crm/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;   # SPA fallback for client-side routing
    }

    # --- Backend API + Sanctum: proxy into the Laravel app ---
    location ~ ^/(api|sanctum)(/.*)?$ {
        root /var/www/crm/backend/public;
        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass unix:/run/php/php8.2-fpm.sock;
            fastcgi_param SCRIPT_FILENAME /var/www/crm/backend/public/index.php;
            include fastcgi_params;
        }
    }

    # Storage-served files (e.g. uploaded logos) — adjust if you serve these differently
    location /storage {
        alias /var/www/crm/backend/storage/app/public;
    }

    client_max_body_size 20M;    # CSV imports go up to 10MB per the app's own limit; leaves headroom

    # Once you have a domain + certbot, run:
    #   sudo apt install -y certbot python3-certbot-nginx
    #   sudo certbot --nginx -d your-domain.com
    # It rewrites this file to add the TLS block automatically.
}
